name: "ctr-evolver-qa"
version: "0.7.0"
competition: "grounded-reasoning"

agent:
  type: "harness"
  harness_name: "openhands-sdk"
  model: "openrouter/qwen/qwen3-coder"
  skills_dir: "skills/"

  config:
    reasoning_effort: "high"
    max_iterations: 50

  env:
    LLM_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"

environment:
  memory: "8G"
  timeout_per_task: 600
